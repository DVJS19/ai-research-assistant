name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB:       research_assistant
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      # Fake keys — tests use mocking, no real API calls
      OPENAI_API_KEY:        sk-test-placeholder
      ANTHROPIC_API_KEY:     sk-ant-test-placeholder
      PINECONE_API_KEY:      test-placeholder
      COHERE_API_KEY:        test-placeholder
      BRAVE_SEARCH_API_KEY:  test-placeholder
      GROQ_API_KEY:          test-placeholder
      LANGCHAIN_API_KEY:     test-placeholder
      DATABASE_URL:          postgresql+asyncpg://postgres:postgres@localhost:5432/research_assistant
      REDIS_URL:             redis://localhost:6379/0
      WORKER_MODEL:          claude-haiku-4-5
      SYNTHESIS_MODEL:       claude-sonnet-4-6
      EMBEDDING_MODEL:       text-embedding-3-small
      PINECONE_INDEX_NAME:   research-assistant
      PINECONE_NAMESPACE:    default
      APP_ENV:               development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

      - name: Check code style
        run: uv run ruff check .